services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "<host-api-port>:3000"
    environment:
      DATABASE_URL: file:/data/opensplit.db
    volumes:
      - opensplit_data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_BRAND_NAME: ${BRAND_NAME:-OpenSplit}
    ports:
      - "<host-web-port>:3100"
    environment:
      OPENSPLIT_API_URL: http://api:3000
      OPENSPLIT_MCP_URL: http://mcp:3001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEXT_PUBLIC_BRAND_NAME: ${BRAND_NAME:-OpenSplit}
    depends_on:
      - api
      - mcp

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    ports:
      - "<host-mcp-port>:3001"
    environment:
      OPENSPLIT_BASE_URL: http://api:3000
    depends_on:
      - api

volumes:
  opensplit_data:
