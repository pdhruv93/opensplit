services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "<host-api-port>:3000"
    environment:
      DATABASE_URL: file:/data/opensplit.db
    volumes:
      - opensplit_data:/data

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    ports:
      - "<host-mcp-port>:3001"
    environment:
      OPENSPLIT_BASE_URL: http://api:3000
    depends_on:
      - api

volumes:
  opensplit_data:
