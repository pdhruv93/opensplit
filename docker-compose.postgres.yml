# Use with: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up
#
# Before using, change the provider in packages/api/prisma/schema.prisma to "postgresql"
# and rebuild: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opensplit
      POSTGRES_USER: opensplit
      POSTGRES_PASSWORD: opensplit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensplit"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    environment:
      DATABASE_URL: postgresql://opensplit:opensplit@db:5432/opensplit
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
